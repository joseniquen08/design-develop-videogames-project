<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combate Naval de Angamos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="bloque_juego"></div>

    <!-- HUD wrapper — se posiciona y escala junto al canvas via syncHUD() -->
    <div id="hud-wrapper">

        <!-- HUD acto 1 (initialState legacy) -->
        <div id="hud-in-game">
            <img id="grau-face" src="">
        </div>

        <!-- HUD acto final (firstAct + secondAct) -->
        <div id="hud-main2">
            <img id="grau-face-2" src="img/personaje-principal/cara/sprite-miguel-grau-normal.png">
            <div id="wave-counter">Oleada 1</div>
            <div id="hp-bar-track">
                <div id="hp-bar"></div>
            </div>
        </div>

    </div>

    <script src="phaser.js"></script>
    <script src="js/config.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/scenes/intro.js"></script>
    <script src="js/scenes/scene1.js"></script>
    <script src="js/scenes/scene2.js"></script>
    <script src="js/scenes/intro2.js"></script>
    <script src="js/scenes/scene3.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/acts/firstAct.js"></script>
    <script src="js/acts/secondAct.js"></script>
    <script src="js/ending.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
